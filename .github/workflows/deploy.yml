name: Deploy via SSH (Custom Port)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install NPM Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy Files via Rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='storage/app/temp' \
            --exclude='tests' \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_TARGET }}/

      - name: Run Remote Commands
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.REMOTE_TARGET }} && php artisan storage:link 2>/dev/null; php artisan migrate --force && php artisan optimize && php artisan view:clear && php artisan config:clear"
